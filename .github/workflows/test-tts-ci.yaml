name: TTS CI

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: tts-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OMNI_CI_HOME: >-
    ${{ github.event_name == 'pull_request'
        && format('/github/home/pr-{0}', github.event.pull_request.number)
        || format('/github/home/run-{0}', github.run_id) }}
  TTS_MODEL_PATH: boson-sglang/higgs-audio-v3-TTS-4B-grpo05200410999

# DAG:
#   setup (install-deps under OMNI_CI_HOME + verify TTS weights)
#     ├── stage-0-whisper-asr ─────────────┬──► stage-1-non-streaming ──┐
#                                          └──► stage-2-streaming ──────┤
#                                                                      └──► stage-3-consistency
#   cleanup runs only after full success, preserving host cache on failures.

jobs:
  setup:
    name: setup - omni venv
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 15
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni
          install-deps: "true"

      - uses: ./.github/actions/omni-save-cache
        with:
          venv-name: omni

      - name: Ensure TTS model weights
        shell: bash
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
        run: bash .github/scripts/ensure_hf_models.sh omni "$TTS_MODEL_PATH"

  stage-0-whisper-asr:
    name: stage 0 - whisper ASR correctness
    needs: setup
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 30
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run Whisper ASR correctness
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_whisper_asr_ci.py -v -s -x
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_HUB_DISABLE_XET: "1"
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: Whisper ASR correctness

  stage-1-non-streaming:
    name: stage 1 - non-streaming
    needs: [setup, stage-0-whisper-asr]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 25
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Prepare speaker similarity assets
        shell: bash
        run: |
          source omni/bin/activate
          python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
        env:
          HF_ENDPOINT: https://hf-mirror.com
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim

      - name: Run TTS non-streaming benchmark stage
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_tts_ci.py -v -s -x --concurrency 16 --tts-stage tts-stage-1-nonstream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          SEEDTTS_SIM_CACHE_DIR: /github/home/seedtts-wavlm-sim
          TTS_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/nonstream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 1 (non-streaming)
          artifact-search-root: stage-results/nonstream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
            */similarity_results.json
          artifact-upload-name: tts-stage-1-results
          artifact-upload-path: stage-results/nonstream
          artifact-if-no-files-found: error

  stage-2-streaming:
    name: stage 2 - streaming
    needs: [setup, stage-0-whisper-asr]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: [self-hosted]
    timeout-minutes: 25
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-setup
        with:
          venv-name: omni

      - name: Run TTS streaming benchmark stage
        shell: bash
        run: |
          source omni/bin/activate
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            pytest tests/test_model/test_tts_ci.py -v -s -x --concurrency 16 --tts-stage tts-stage-2-stream
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_TOKEN: ${{ secrets.BOSON_HF_TOKEN }}
          TTS_STAGE_OUTPUT_ROOT: ${{ github.workspace }}/stage-results/stream
          TORCHINDUCTOR_CACHE_DIR: ${{ env.OMNI_CI_HOME }}/.torchinductor

      - name: Post-stage cleanup
        if: always()
        uses: ./.github/actions/omni-post-stage
        with:
          stage-label: TTS stage 2 (streaming)
          artifact-search-root: stage-results/stream
          artifact-path-globs: |
            */speed_results.json
            */wer_results.json
          artifact-upload-name: tts-stage-2-results
          artifact-upload-path: stage-results/stream
          artifact-if-no-files-found: error

  stage-3-consistency:
    name: stage 3 - consistency
    needs: [stage-1-non-streaming, stage-2-streaming]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Download stage 1 artifact
        uses: actions/download-artifact@v4
        with:
          name: tts-stage-1-results
          path: stage-artifacts/nonstream

      - name: Download stage 2 artifact
        uses: actions/download-artifact@v4
        with:
          name: tts-stage-2-results
          path: stage-artifacts/stream

      - name: Run consistency check
        shell: bash
        run: |
          export PYTHONPATH=$PWD
          bash .github/scripts/run_flaky_pytest.sh \
            python -m pytest tests/test_model/test_tts_consistency_artifacts.py -v -s -x
        env:
          TTS_STAGE1_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/nonstream
          TTS_STAGE2_SPEED_RESULTS_DIR: ${{ github.workspace }}/stage-artifacts/stream
          TTS_CONSISTENCY_CONCURRENCY: "16"

  cleanup:
    name: cleanup - reclaim host cache
    needs:
      - setup
      - stage-0-whisper-asr
      - stage-1-non-streaming
      - stage-2-streaming
      - stage-3-consistency
    if: >-
      success() &&
      (github.event_name == 'workflow_dispatch' ||
       (!github.event.pull_request.draft &&
        contains(github.event.pull_request.labels.*.name, 'run-ci')))
    runs-on: [self-hosted]
    timeout-minutes: 5
    container:
      image: frankleeeee/sglang-omni:dev
      options: --gpus all --rm -v /dev/shm:/dev/shm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/omni-cleanup-host
        with:
          ci-home: ${{ env.OMNI_CI_HOME }}
